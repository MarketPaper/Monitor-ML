name: Deploy to Spaceship

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Deploy via SFTP with sshpass
      run: |
        apt-get update && apt-get install -y sshpass rsync
        sshpass -p "${{ secrets.FTP_PASSWORD }}" rsync -avz --delete \
          -e "ssh -o StrictHostKeyChecking=no" \
          ./src/ \
          "${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }}:${{ secrets.FTP_REMOTE_PATH }}"
      shell: bash
